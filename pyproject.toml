[project]
name = "llmfit"
version = "0.0.0"
description = "Unofficial PyPI distribution of llmfit – the LLM model management CLI"
authors = [
    { name = "James Hoctor", email = "JEHoctor@protonmail.com" }
]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.8"
keywords = ["llm", "cli", "machine-learning", "model-management"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.scripts]
llmfit = "llmfit.__main__:main"

[project.urls]
Homepage = "https://github.com/AlexsJones/llmfit"
"Bug Tracker" = "https://github.com/AlexsJones/llmfit/issues"
"Packaging Source" = "https://github.com/JEHoctor/llmfit-pypi"

[build-system]
requires = ["uv_build>=0.10.7,<0.11.0"]
build-backend = "uv_build"
