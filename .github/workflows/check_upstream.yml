name: Check for new llmfit release

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:       # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Compare upstream tag with published PyPI version
        id: check
        run: |
          LATEST_TAG=$(curl -sf https://api.github.com/repos/AlexsJones/llmfit/releases/latest \
            | jq -r .tag_name)
          # Strip leading 'v' to get a bare version string for comparison
          LATEST="${LATEST_TAG#v}"

          PUBLISHED=$(curl -sf https://pypi.org/pypi/llmfit/json \
            | jq -r '.info.version // "none"' \
            || echo "none")

          echo "upstream tag:      $LATEST_TAG"
          echo "upstream version:  $LATEST"
          echo "published version: $PUBLISHED"

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST"         >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED"   >> "$GITHUB_OUTPUT"

      - name: Trigger build-and-publish if versions differ
        if: steps.check.outputs.latest != steps.check.outputs.published
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'build_and_publish.yml',
              ref:   'main',
              inputs: { version: '${{ steps.check.outputs.latest_tag }}' },
            });
            console.log('Triggered build_and_publish.yml for ${{ steps.check.outputs.latest_tag }}');
