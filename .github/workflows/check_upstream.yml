name: Check for new llmfit release

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:       # Allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Find upstream versions not yet published to PyPI
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch all upstream release tags across all pages.
          # gh api --paginate emits one JSON array per page; jq -s flattens them.
          UPSTREAM_TAGS=$(gh api --paginate /repos/AlexsJones/llmfit/releases \
            | jq -s '[.[].[] | .tag_name]')
          if [ "$(echo "$UPSTREAM_TAGS" | jq 'length')" -eq 0 ]; then
            echo "ERROR: no upstream releases found; gh api call may have failed"
            exit 1
          fi

          # Fetch all published PyPI versions (empty array if package doesn't exist yet)
          PYPI_VERSIONS=$(curl -sf https://pypi.org/pypi/llmfit/json \
            | jq '[.releases | keys[]]' \
            || echo '[]')

          echo "Upstream tags:  $UPSTREAM_TAGS"
          echo "PyPI versions:  $PYPI_VERSIONS"

          # Compute tags present upstream but not on PyPI, sorted oldest-first.
          # Only consider tags that match vX.Y.Z to skip malformed upstream tags.
          #
          # [0, 9, 2] is the oldest version we want to publish. It was the latest
          # version on PyPI when this backfill logic was introduced. To publish
          # older versions, lower this floor.
          TAGS=$(jq -n \
            --argjson u "$UPSTREAM_TAGS" \
            --argjson p "$PYPI_VERSIONS" \
            '($u | map(select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))) | map(ltrimstr("v"))) as $stripped
             | ($stripped - $p)
             | map(select((split(".") | map(tonumber)) >= [0, 9, 2]))
             | sort_by(split(".") | map(tonumber))
             | map("v" + .)')

          echo "Tags to publish: $TAGS"
          echo "tags=$TAGS" | tr -d ' \n' >> "$GITHUB_OUTPUT"

      - name: Trigger build-and-publish for each missing version
        if: steps.check.outputs.tags != '[]'
        uses: actions/github-script@v8
        with:
          script: |
            const tags = ${{ steps.check.outputs.tags }};
            for (const tag of tags) {
              console.log(`Triggering build_and_publish.yml for ${tag}`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                workflow_id: 'build_and_publish.yml',
                ref:   'main',
                inputs: { version: tag },
              });
            }
