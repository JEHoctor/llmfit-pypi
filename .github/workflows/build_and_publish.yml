name: Build and publish llmfit wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream llmfit release tag (e.g. v0.8.6)'
        required: true

jobs:
  # ------------------------------------------------------------------
  # Build all platform wheels
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v7

      - name: Build platform wheels
        run: python build_wheels.py --version "${{ inputs.version }}" --output-dir dist/

      - name: List built artifacts
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Publish to PyPI via OIDC trusted publisher (no API tokens needed)
  # ------------------------------------------------------------------
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/llmfit/
    permissions:
      id-token: write   # Required for OIDC

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: List artifacts to publish
        run: ls -lh dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password needed; authentication is via OIDC trusted publisher.
        # Configure trusted publisher at pypi.org/manage/project/llmfit/settings/publishing/
        #   Repository: JEHoctor/llmfit-pypi
        #   Workflow:   build_and_publish.yml
        #   Environment: pypi
